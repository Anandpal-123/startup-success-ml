<html>
<head>
<title>Start-Up Company Success Prediction</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<style>
body {
  background-image: url({{ url_for('static', filename='images/back.jpg') }});
  background-size: cover;
}

.form-box {
    width: 50%;
    margin: auto;
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 10px;
}

input[type=text] {
    width: 100%;
    padding: 8px;
    margin: 5px 0 15px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

input[type=submit] {
    background-color: #2E86C1;
    color: white;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

input[type=submit]:hover {
    background-color: #1B4F72;
}
</style>

<body>

<div id="wrapper">
    <div id="header">
        <div id="logo">
            <center>
                <font size="4" color="white">
                An Efficient Novel Approach for Prediction of Start-Up Company Success Rates Through ML Paradigms
                </font>
            </center>
        </div>
    </div>

    <div id="menu">
        <ul><center>
            <li><a href="index"><font color="white">Home</font></a></li>
            <li><a href="PredictSuccess"><font color="white">Start-Up Success Prediction</font></a></li>
        </center></ul>
        <br class="clearfix" />
    </div>

    <div id="splash">
        <img class="pic" src={{ url_for('static', filename='images/investor.jpg') }} width="870" height="230" alt="" />
    </div>

    <br/>

    <div class="form-box">
        <h3 align="center">Enter Start-Up Details</h3>

        <form action="{{ url_for('PredictAction') }}" method="post">

            <label>Relationships:</label>
            <input type="text" name="t1" required>

            <label>Funding Rounds:</label>
            <input type="text" name="t2" required>

            <label>Total Funding (USD):</label>
            <input type="text" name="t3" required>

            <label>Milestones:</label>
            <input type="text" name="t4" required>

            <label>Average Participants:</label>
            <input type="text" name="t5" required>

            <label>Latitude:</label>
            <input type="text" name="t6" required>

            <label>Longitude:</label>
            <input type="text" name="t7" required>

            <label>City:</label>
            <input type="text" name="t8" required>

            <label>Category Code:</label>
            <input type="text" name="t9" required>

            <input type="submit" value="Predict Startup Success">

        </form>

        <br/>
        <center>
            <font size="3" color="black">
                {{ data|safe }}
            </font>
        </center>

    </div>

</div>

</body>
</html>
